send_anonymous_usage_stats: true
project_id: "tap-dianomi"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-dianomi"
    namespace: "tap_dianomi"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings:
    - name: api_key
      sensitive: true
      label: API Key
      description: API key provided by your Dianomi account manager

    - name: email
      label: Email
      description: Email address associated with your Dianomi account

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: The earliest record date to sync (ISO 8601 format)

    - name: partner_id
      kind: integer
      label: Partner ID
      description: Publisher Partner ID to filter results. Found in the left sidebar of the Dianomi web interface.

    - name: client_id
      kind: integer
      label: Client ID
      description: Advertiser Client ID to filter results.

    settings_group_validation:
    - [api_key, email]

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
