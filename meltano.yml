send_anonymous_usage_stats: true
project_id: "tap-dianomi"
default_environment: test
requires_meltano: ">=4.0"
environments:
- name: test
plugins:
  extractors:
  - name: "tap-dianomi"
    namespace: "tap_dianomi"
    pip_url: -e .
    capabilities:
    - state
    - catalog
    - discover
    - about
    - stream-maps
    - structured-logging

    settings:
    - name: api_key
      sensitive: true
      label: API Key
      description: Dianomi API key

    - name: email
      label: Email
      description: Dianomi account email address

    - name: client_id
      kind: integer
      label: Client ID
      description: Advertiser Client ID to filter results by - required for advertisers

    - name: partner_id
      kind: integer
      label: Partner ID
      description: Publisher partner ID to filter results by - required for publishers

    - name: start_date
      kind: date_iso8601
      label: Start Date
      description: The earliest record date to sync (ISO 8601 format) - defaults to the last year

    settings_group_validation:
    - [api_key, email, client_id]
    - [api_key, email, partner_id]

  loaders:
  - name: target-jsonl
    variant: andyh1203
    pip_url: target-jsonl
